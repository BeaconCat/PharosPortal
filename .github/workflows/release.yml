name: Release

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.1"
          cache: true

      - name: Cross-compile binaries
        run: |
          set -eu
          VERSION="${GITHUB_REF_NAME:-dev}"
          mkdir -p dist
          build() {
            local goos="$1" goarch="$2" ext="$3"
            local name="pharosportal-${goos}-${goarch}${ext}"
            echo ">> building ${name}"
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
              go build -trimpath -ldflags "-s -w" -o "dist/${name}" ./cmd/pharosportal
          }
          build windows amd64 .exe
          build windows arm64 .exe
          build linux   amd64 ""
          build linux   arm64 ""
          build darwin  amd64 ""
          build darwin  arm64 ""

      - name: Package archives
        run: |
          set -eu
          cd dist
          for f in pharosportal-*; do
            case "$f" in
              *.exe) zip "${f%.exe}.zip" "$f" ;;
              *)     tar -czf "${f}.tar.gz" "$f" ;;
            esac
          done
          ls -la

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.tar.gz
